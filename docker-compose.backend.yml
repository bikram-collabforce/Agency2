# Backend only — runs FastAPI. Requires DATABASE_URL (e.g. from a separate database service or managed Postgres).
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/appdb}
